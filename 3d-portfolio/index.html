<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- SEO Meta Tags -->
    <title>N.V. Yashwanth | AI/ML & Full Stack Developer Portfolio</title>
    <meta name="description" content="Portfolio of N.V. Yashwanth, a Computer Science Engineering student specializing in AI, Machine Learning, and Full Stack Development. Discover projects, research, and coding achievements." />
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Runtime Error Visual Debugger -->
    <script>
      window.addEventListener('error', function(e) {
        const div = document.createElement('div');
        div.style.position = 'fixed';
        div.style.top = '10px';
        div.style.left = '10px';
        div.style.right = '10px';
        div.style.background = '#fee2e2';
        div.style.border = '2px solid #ef4444';
        div.style.color = '#991b1b';
        div.style.padding = '20px';
        div.style.borderRadius = '12px';
        div.style.zIndex = '99999';
        div.style.fontFamily = 'monospace';
        div.style.fontSize = '12px';
        div.style.whiteSpace = 'pre-wrap';
        div.style.boxShadow = '0 10px 15px -3px rgba(0, 0, 0, 0.1)';
        div.innerText = 'Runtime Error: ' + e.message + '\\nAt: ' + e.filename + ':' + e.lineno + ':' + e.colno + '\\n\\nStack:\\n' + (e.error ? e.error.stack : 'No stack available');
        document.body.appendChild(div);
      });
      window.addEventListener('unhandledrejection', function(e) {
        const div = document.createElement('div');
        div.style.position = 'fixed';
        div.style.top = '10px';
        div.style.left = '10px';
        div.style.right = '10px';
        div.style.background = '#fee2e2';
        div.style.border = '2px solid #ef4444';
        div.style.color = '#991b1b';
        div.style.padding = '20px';
        div.style.borderRadius = '12px';
        div.style.zIndex = '99999';
        div.style.fontFamily = 'monospace';
        div.style.fontSize = '12px';
        div.style.whiteSpace = 'pre-wrap';
        div.style.boxShadow = '0 10px 15px -3px rgba(0, 0, 0, 0.1)';
        div.innerText = 'Unhandled Promise Rejection: ' + (e.reason ? e.reason.message || e.reason : 'Unknown reason') + '\\n\\nStack:\\n' + (e.reason && e.reason.stack ? e.reason.stack : 'No stack available');
        document.body.appendChild(div);
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
